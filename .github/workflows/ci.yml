name: CI

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install mypy pytest pytest-cov ruff

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy src

      - name: Tests
        run: pytest --cov=netset2p2p --cov-report=term-missing --cov-report=xml:coverage.xml

      - name: Generate coverage badge files
        if: matrix.python-version == '3.12' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: python scripts/update_coverage_badge.py --coverage-xml coverage.xml --output-dir .github/badges

      - name: Commit coverage badge
        if: matrix.python-version == '3.12' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/badges/coverage.json .github/badges/coverage.svg
          git diff --cached --quiet && exit 0
          git commit -m "chore(ci): update coverage badge [skip ci]"
          git push
